<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote Sperre</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --red: #ff2d2d;
      --green: #00ff88;
      --dim: #333;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      position: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
      z-index: 100;
    }

    #app {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
      transition: background 0.6s ease;
    }

    #app.locked { background: #1a0000; }

    .corner { position: fixed; width: 24px; height: 24px; opacity: 0.4; }
    .corner-tl { top: 16px; left: 16px; border-top: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-tr { top: 16px; right: 16px; border-top: 2px solid var(--red); border-right: 2px solid var(--red); }
    .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); }

    .grid-line { position: fixed; background: var(--dim); opacity: 0.15; }
    .grid-h { width: 100%; height: 1px; left: 0; }
    .grid-v { height: 100%; width: 1px; top: 0; }

    #lock-icon {
      font-size: 96px;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #lock-icon.locked { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 30px var(--red)); }
      50% { filter: drop-shadow(0 0 60px var(--red)); }
    }

    #status-text {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      transition: color 0.4s;
    }

    #status-text.locked {
      color: var(--red);
      animation: flicker 4s infinite;
    }

    #status-text.ready { color: var(--green); }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.4; }
      97% { opacity: 1; }
      98% { opacity: 0.6; }
    }

    #connection {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 16px;
      border: 1px solid var(--dim);
      border-radius: 2px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    #connection.connected { color: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,136,0.2); }
    #connection.error { color: var(--red); border-color: var(--red); }

    #topic-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      position: fixed;
      bottom: 28px;
    }

    /* Banner der erscheint wenn Seite nach Sperre wieder geöffnet wird */
    #reopen-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--red);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      text-align: center;
      padding: 14px;
      z-index: 200;
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="grid-line grid-h" style="top: 33%"></div>
  <div class="grid-line grid-h" style="top: 66%"></div>
  <div class="grid-line grid-v" style="left: 20%"></div>
  <div class="grid-line grid-v" style="left: 80%"></div>

  <div id="reopen-banner">⚠ GERÄT GESPERRT – WARTE AUF FREIGABE</div>

  <div id="app">
    <div id="lock-icon">🔓</div>
    <div id="status-text" class="ready">BEREIT</div>
    <div id="connection">VERBINDE...</div>
  </div>

  <div id="topic-label">THEMA: leojonathan2026123</div>

  <script>
    const TOPIC = "leojonathan2026123";
    const STORAGE_KEY = "remote_locked";

    const app = document.getElementById('app');
    const lockIcon = document.getElementById('lock-icon');
    const statusText = document.getElementById('status-text');
    const connection = document.getElementById('connection');
    const reopenBanner = document.getElementById('reopen-banner');

    let lastId = localStorage.getItem('last_ntfy_id') || '';

    // Beim Öffnen: war die Seite gesperrt? → sofort wieder sperren
    if (localStorage.getItem(STORAGE_KEY) === 'true') {
      setLocked(true);
      reopenBanner.style.display = 'block';
    }

    function setLocked(val) {
      if (val) {
        app.classList.add('locked');
        lockIcon.textContent = '🔒';
        lockIcon.classList.add('locked');
        statusText.textContent = 'GESPERRT';
        statusText.className = 'locked';
        localStorage.setItem(STORAGE_KEY, 'true');
        // Vollbild in Chrome
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      } else {
        app.classList.remove('locked');
        lockIcon.textContent = '🔓';
        lockIcon.classList.remove('locked');
        statusText.textContent = 'BEREIT';
        statusText.className = 'ready';
        localStorage.setItem(STORAGE_KEY, 'false');
        reopenBanner.style.display = 'none';
        if (document.exitFullscreen) {
          document.exitFullscreen().catch(() => {});
        }
      }
    }

    function handleCommand(cmd) {
      const c = cmd.toLowerCase().trim();
      if (c === 'start') {
        setLocked(true);
      } else if (c === 'stop' || c === 'stopp') {
        setLocked(false);
      } else if (c === 'exit') {
        setLocked(false);
        window.close();
      }
    }

    // Echtzeit via SSE
    function connectSSE() {
      connection.textContent = 'VERBINDE...';
      connection.className = '';

      const es = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);

      es.onopen = () => {
        connection.textContent = 'VERBUNDEN ✓';
        connection.className = 'connected';
      };

      es.addEventListener('message', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.id === lastId) return;
          lastId = data.id;
          localStorage.setItem('last_ntfy_id', lastId);

          let msg = data.message || '';
          try {
            const inner = JSON.parse(msg);
            if (inner.message) msg = inner.message;
          } catch {}

          handleCommand(msg);
        } catch {}
      });

      es.onerror = () => {
        connection.textContent = 'UNTERBROCHEN – VERBINDE NEU...';
        connection.className = 'error';
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // Zurück-Navigation blockieren
    history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', () => {
      history.pushState(null, '', window.location.href);
    });

    connectSSE();
  </script>
</body>
</html>
