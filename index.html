<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote Sperre</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --red: #ff2d2d;
      --green: #00ff88;
      --dim: #222;
      --muted: #555;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #fff;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      position: fixed;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
      z-index: 999;
    }

    .corner { position: fixed; width: 24px; height: 24px; opacity: 0.3; z-index: 50; }
    .corner-tl { top: 16px; left: 16px; border-top: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-tr { top: 16px; right: 16px; border-top: 2px solid var(--red); border-right: 2px solid var(--red); }
    .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid var(--red); border-left: 2px solid var(--red); }
    .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid var(--red); border-right: 2px solid var(--red); }

    /* ── BEREIT SCREEN ── */
    #ready-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 24px;
      transition: opacity 0.4s;
    }

    #ready-screen.hidden { display: none; }

    #lock-icon {
      font-size: 96px;
      filter: drop-shadow(0 0 20px #333);
      transition: all 0.5s;
    }

    #status-text {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--green);
    }

    #connection {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 16px;
      border: 1px solid var(--dim);
      border-radius: 2px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    #connection.connected { color: var(--green); border-color: var(--green); box-shadow: 0 0 12px rgba(0,255,136,0.2); }
    #connection.error { color: var(--red); border-color: var(--red); }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      position: fixed;
      inset: 0;
      background: #0d0000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 24px;
      z-index: 80;
    }

    #lock-screen.active { display: flex; }

    .lock-title {
      font-size: 48px;
      font-weight: 800;
      color: var(--red);
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.3; }
      96% { opacity: 1; }
      97% { opacity: 0.5; }
      98% { opacity: 1; }
    }

    .lock-big-icon {
      font-size: 80px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--red)); }
      50% { filter: drop-shadow(0 0 50px var(--red)); }
    }

    /* PIN Display */
    .pin-display {
      display: flex;
      gap: 14px;
      margin-top: 8px;
    }

    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid var(--red);
      transition: background 0.15s;
    }

    .pin-dot.filled { background: var(--red); }
    .pin-dot.wrong { background: #ff000050; border-color: #ff000080; animation: shake 0.3s; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* PIN Pad */
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 240px;
    }

    .pin-btn {
      background: #1a0000;
      border: 1px solid #3a0000;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      padding: 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      text-align: center;
    }

    .pin-btn:active { background: #3a0000; border-color: var(--red); }

    .pin-btn.wide {
      grid-column: span 2;
    }

    .pin-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #3a0000;
      letter-spacing: 2px;
    }

    #topic-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      position: fixed;
      bottom: 28px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- BEREIT -->
  <div id="ready-screen">
    <div id="lock-icon">🔓</div>
    <div id="status-text">BEREIT</div>
    <div id="connection">VERBINDE...</div>
  </div>

  <!-- GESPERRT mit PIN -->
  <div id="lock-screen">
    <div class="lock-big-icon">🔒</div>
    <div class="lock-title">GESPERRT</div>
    <div class="pin-display">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
      <div class="pin-dot" id="d5"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn" onclick="pinPress('del')">⌫</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn" onclick="pinPress('ok')">OK</button>
    </div>
    <div class="pin-hint">PIN EINGEBEN ZUM ENTSPERREN</div>
  </div>

  <div id="topic-label">THEMA: leojonathan2026123</div>

  <script>
    const TOPIC = "leojonathan2026123";
    const CORRECT_PIN = "958460";
    const LOCK_KEY = "remote_locked";

    let currentPin = "";
    let isLocked = false;
    let lastId = localStorage.getItem('last_ntfy_id') || '';

    const readyScreen = document.getElementById('ready-screen');
    const lockScreen = document.getElementById('lock-screen');
    const connection = document.getElementById('connection');

    // Beim Öffnen: war gesperrt? → sofort wieder sperren
    if (localStorage.getItem(LOCK_KEY) === 'true') {
      setLocked(true);
    }

    function setLocked(val) {
      isLocked = val;
      localStorage.setItem(LOCK_KEY, val ? 'true' : 'false');
      if (val) {
        readyScreen.classList.add('hidden');
        lockScreen.classList.add('active');
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      } else {
        lockScreen.classList.remove('active');
        readyScreen.classList.remove('hidden');
        currentPin = "";
        updateDots();
        if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
      }
    }

    // PIN Logik
    function pinPress(key) {
      if (key === 'del') {
        currentPin = currentPin.slice(0, -1);
      } else if (key === 'ok') {
        checkPin();
        return;
      } else {
        if (currentPin.length >= 6) return;
        currentPin += key;
        if (currentPin.length === 6) checkPin();
      }
      updateDots();
    }

    function updateDots() {
      for (let i = 0; i < 6; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.toggle('filled', i < currentPin.length);
        dot.classList.remove('wrong');
      }
    }

    function checkPin() {
      if (currentPin === CORRECT_PIN) {
        setLocked(false);
      } else {
        // Falsche PIN – schütteln und zurücksetzen
        for (let i = 0; i < 6; i++) {
          document.getElementById('d' + i).classList.add('wrong');
        }
        setTimeout(() => {
          currentPin = "";
          updateDots();
        }, 600);
      }
    }

    // Remote Befehle
    function handleCommand(cmd) {
      const c = cmd.toLowerCase().trim();
      if (c === 'start') {
        setLocked(true);
      } else if (c === 'stop' || c === 'stopp') {
        setLocked(false);
      } else if (c === 'exit') {
        setLocked(false);
        window.close();
      }
    }

    // SSE Verbindung
    function connectSSE() {
      connection.textContent = 'VERBINDE...';
      connection.className = '';

      const es = new EventSource(`https://ntfy.sh/${TOPIC}/sse`);

      es.onopen = () => {
        connection.textContent = 'VERBUNDEN ✓';
        connection.className = 'connected';
      };

      es.addEventListener('message', (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.id === lastId) return;
          lastId = data.id;
          localStorage.setItem('last_ntfy_id', lastId);

          let msg = data.message || '';
          try {
            const inner = JSON.parse(msg);
            if (inner.message) msg = inner.message;
          } catch {}

          handleCommand(msg);
        } catch {}
      });

      es.onerror = () => {
        connection.textContent = 'UNTERBROCHEN – VERBINDE NEU...';
        connection.className = 'error';
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // Zurück-Navigation blockieren
    history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', () => {
      history.pushState(null, '', window.location.href);
    });

    connectSSE();
  </script>
</body>
</html>
